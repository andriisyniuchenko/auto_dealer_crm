services:
  db:
    image: postgres:16
    container_name: auto_dealer_crm_db
    environment:
      POSTGRES_DB: auto_dealer_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auto_dealer_crm"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: auto_dealer_crm_web
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data: