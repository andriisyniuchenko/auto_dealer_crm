{% extends "base.html" %}

{% block title %}Log Call{% endblock %}

{% block content %}
<h2>Log Call — {{ lead.first_name }} {{ lead.last_name }}</h2>

<form method="post" class="crm-form">
    <label>Call Result</label>
    <select name="result" required>
        <option value="Reached customer">Reached customer</option>
        <option value="Left voicemail">Left voicemail</option>
        <option value="No answer">No answer</option>
        <option value="Customer asked to call later">Customer asked to call later</option>
    </select>

    <label>Notes</label>
    <textarea name="notes"></textarea>

    <button type="submit">Save Call</button>
</form>
{% endblock %}
