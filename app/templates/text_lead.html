{% extends "base.html" %}

{% block title %}Send Text{% endblock %}

{% block content %}
<h2>Send Text — {{ lead.first_name }} {{ lead.last_name }}</h2>

<form method="post" class="crm-form">
    <label>Message</label>
    <textarea name="message" required></textarea>

    <button type="submit">Save Text Activity</button>
</form>
{% endblock %}
